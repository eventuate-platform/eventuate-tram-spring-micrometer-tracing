# Enable debug logging for our tracing components
logging.level.io.eventuate.tram.spring.micrometer.tracing=DEBUG
logging.level.io.micrometer.tracing=DEBUG
logging.level.zipkin2=DEBUG
logging.level.brave=DEBUG

# Tracing configuration
management.tracing.sampling.probability=1.0

# Zipkin configuration (endpoint set dynamically in test)
management.zipkin.tracing.enabled=true
